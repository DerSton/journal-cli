name: Security Audit

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.lock"
      - ".github/workflows/audit.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "Cargo.lock"
      - ".github/workflows/audit.yaml"
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Run cargo-audit
        uses: actions-rust-lang/audit@v1
